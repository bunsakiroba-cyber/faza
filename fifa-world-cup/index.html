
<!DOCTYPE html>
<html lang="ro" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Loading — Video</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: #0d0f14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e5e5e5;
      overflow: hidden;
      position: relative;
    }

    /* Background glow */
    .bg-glow {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulseGlow 3s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%,100% { opacity:.5; transform:translate(-50%,-50%) scale(1); }
      50%      { opacity:1;  transform:translate(-50%,-50%) scale(1.2); }
    }

    /* Film strip bars top & bottom */
    .film-strip {
      position: fixed; top:0; left:0; right:0; height:5px;
      background: repeating-linear-gradient(90deg,
        #22c55e 0,#22c55e 14px, transparent 14px, transparent 22px);
      opacity:.5; z-index:10;
    }
    .film-strip.bot { top:auto; bottom:0; }

    /* Back link */
    .back-link {
      position: fixed; top:16px; left:16px; z-index:20;
      display:flex; align-items:center; gap:5px;
      font-size:.76rem; color:#555; text-decoration:none;
      transition:color .2s;
    }
    .back-link:hover { color:#22c55e; }

    /* Main card */
    .card {
      position:relative; z-index:1;
      display:flex; flex-direction:column;
      align-items:center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Logo */
    .logo {
      font-size:1.7rem; font-weight:800;
      letter-spacing:-.02em;
      margin-bottom:38px;
      text-decoration:none;
    }
    .logo .a { color:#22c55e; }
    .logo .b { color:#fff; }

    /* Spinner */
    .loader-wrap {
      position:relative;
      width:92px; height:92px;
      margin-bottom:28px;
    }
    .ring-outer {
      position:absolute; inset:0;
      border-radius:50%;
      border:3px solid transparent;
      border-top-color:#22c55e;
      border-right-color:rgba(34,197,94,.25);
      animation:spinO 1s linear infinite;
    }
    @keyframes spinO { to { transform:rotate(360deg); } }

    .ring-inner {
      position:absolute; inset:13px;
      border-radius:50%;
      border:2px solid transparent;
      border-bottom-color:#4ade80;
      border-left-color:rgba(74,222,128,.2);
      animation:spinI .75s linear infinite reverse;
    }
    @keyframes spinI { to { transform:rotate(360deg); } }

    .ring-center {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
    }
    .ring-center svg {
      animation:pulseIcon 1.6s ease-in-out infinite;
      margin-left:3px;
    }
    @keyframes pulseIcon {
      0%,100% { opacity:.5; transform:scale(.85); }
      50%      { opacity:1;  transform:scale(1.1); }
    }

    /* Text */
    .redir-title {
      font-size:1.05rem; font-weight:700; color:#fff;
      margin-bottom:4px; text-align:center;
    }
    .redir-movie {
      font-size:.85rem; color:#4ade80; font-weight:600;
      margin-bottom:7px; text-align:center;
      max-width:300px; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .redir-sub {
      font-size:.8rem; color:#555;
      text-align:center; margin-bottom:26px;
    }

    /* Progress bar */
    .prog-wrap {
      width:210px; height:3px;
      background:rgba(255,255,255,.07);
      border-radius:2px; overflow:hidden;
      margin-bottom:22px;
    }
    .prog-fill {
      height:100%; width:0;
      background:linear-gradient(90deg,#16a34a,#4ade80);
      border-radius:2px;
      animation:fillBar 2.3s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes fillBar {
      0%   { width:0%; }
      55%  { width:70%; }
      80%  { width:88%; }
      100% { width:100%; }
    }

    /* Security badge */
    .sec-badge {
      display:flex; align-items:center; gap:5px;
      font-size:.7rem; color:#3a3a3a;
    }

    /* Bouncing dots */
    .dots { display:flex; gap:5px; margin-top:20px; }
    .dot {
      width:5px; height:5px;
      background:#22c55e; border-radius:50%;
      animation:dotB 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes dotB {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40%          { opacity:1;  transform:scale(1.25); }
    }
  </style>
</head>
<body>
  <div class="film-strip"></div>
  <div class="film-strip bot"></div>
  <div class="bg-glow"></div>
  <a href="https://facilesrecetas.com" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Faciles Recetas  </a>
  <div class="card">
    <a href="https://facilesrecetas.com" class="logo">
      <span class="a">Faciles</span><span class="b">Recetas</span>

    <div class="loader-wrap">

      <div class="ring-center">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#22c55e">

    </div>
    <div class="redir-title">Loading your content&hellip;</div>

      </svg>
      Secure &amp; encrypted connection
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
